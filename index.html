<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <title>A2Z DSA Course Roadmap</title>
    <style>
        :root {
            /* Theme based on the provided image */
            --primary-color: #404269;
            /* Dark blue/purple for collapsible headers */
            --primary-hover-color: #53557E;
            /* Lighter blue for hover */
            --success-color: #1a8f47;
            /* Green for active/completed sections */
            --success-hover-color: #25a95a;
            /* Lighter green for hover */

            --medium-gray: #282828;
            /* Dark grey page background */
            --white-color: #353535;
            /* Lighter dark grey for the main container */
            --border-color: #b0b0b0;
            /* Borders for tables and elements */

            --text-color: #ffffff;
            /* Main text color for headings */
            --dark-gray: #e0e4e8;
            /* Lighter text for table content */
            --light-gray: #303030;
            /* Slightly darker background for table headers */

            --link-color: #8ea1e9;
            /* Link color */
            --warning-color: #f5a623;
            /* Difficulty indicator: Medium (Orange) */
            --danger-color: #e52d27;
            /* Difficulty indicator: Hard (Red) */

            --completed-bg-color: rgba(26, 143, 71, 0.1);
            /* Subtle background for completed rows */
            --completed-text-color: #63e6be;
            /* Text color for completed topics */

            --progress-bar-bg: var(--success-color);
        }

        /* --- Responsive Font Size Setup --- */
        html {
            /* Set a base font size for the document. 16px is a common default. */
            font-size: 16px;
        }

        /* For tablets and smaller devices */
        @media (max-width: 768px) {
            html {
                font-size: 14px;
            }
        }

        /* For mobile phones */
        @media (max-width: 480px) {
            html {
                font-size: 12px;
            }

            /* Further refine heading sizes on very small screens to prevent overflow */
            h1 {
                font-size: 2rem;
            }

            .collapsible {
                font-size: 1.3rem;
            }

            .sub-collapsible {
                font-size: 1.1rem;
            }
        }

        /* --- End Responsive Font Size Setup --- */


        /* General Body Styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            background-color: var(--medium-gray);
            color: var(--text-color);
            margin: 0;
            padding: 1rem;
        }

        /* Main Container for the Roadmap */
        .container {
            max-width: 1200px;
            margin: 1rem auto;
            background-color: var(--white-color);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }

        /* Heading Styles */
        h1 {
            text-align: center;
            font-size: 2.25rem;
            color: var(--text-color);
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .roadmap-header {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .roadmap-header h1 {
            margin-bottom: 0;
        }

        .toggle-all-btn {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--light-gray);
            color: var(--text-color);
            padding: 0.45rem 0.9rem;
            border-radius: 10px;
            font-weight: 600;
        }

        .toggle-all-btn:hover {
            background: #3a3a3a;
        }

        @media (max-width: 768px) {
            .toggle-all-btn {
                position: static;
                transform: none;
                display: block;
                margin: 0.75rem auto 0;
            }
        }

        /* Collapsible Section Styles */
        .collapsible,
        .sub-collapsible {
            color: #fff;
            cursor: pointer;
            padding: 0.85rem 1.25rem;
            width: 100%;
            border: none;
            text-align: left;
            outline: none;
            margin-top: 0.75rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.4s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            background-color: var(--primary-color);
        }

        /* Progress Bar Pseudo-element */
        .collapsible::before,
        .sub-collapsible::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: var(--progress-width, 0%);
            background-color: var(--progress-bar-bg);
            transition: width 0.4s ease-out, background-color 0.4s ease;
            z-index: 1;
            /* border-radius: 10px; */
        }

        .collapsible {
            font-size: 1.5rem;
        }

        .sub-collapsible {
            font-size: 1.2rem;
        }

        .collapsible:hover,
        .collapsible.active,
        .sub-collapsible:hover,
        .sub-collapsible.active {
            background-color: var(--primary-hover-color);
        }

        .collapsible.completed,
        .sub-collapsible.completed {
            background-color: var(--success-color);
        }

        .collapsible.completed:hover,
        .collapsible.completed.active,
        .sub-collapsible.completed:hover,
        .sub-collapsible.completed.active {
            background-color: var(--success-hover-color);
        }

        .collapsible-title {
            flex-grow: 1;
        }

        .progress-counter {
            font-size: 0.7em;
            font-weight: 500;
            background-color: rgba(0, 0, 0, 0.25);
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            margin-left: 1rem;
            white-space: nowrap;
        }

        .collapsible-title,
        .progress-counter,
        .collapsible::after,
        .sub-collapsible::after {
            position: relative;
            z-index: 2;
        }

        .collapsible::after,
        .sub-collapsible::after {
            content: '+';
            font-size: 1.5em;
            font-weight: bold;
            transition: transform 0.3s ease;
            margin-left: 1rem;
        }

        .collapsible.active::after,
        .sub-collapsible.active::after {
            transform: rotate(45deg);
        }

        .content,
        .sub-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
            background-color: transparent;
        }

        .content {
            border-radius: 0 0 8px 8px;
            border-top: none;
            padding: 0 0.5rem;
        }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.75rem;
            border: 1px solid var(--border-color);
            table-layout: fixed;
            min-width: 800px;
            /* Increased from 700px to accommodate extra column */
        }

        th,
        td {
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.3rem;
            text-align: center;
            vertical-align: middle;
            word-wrap: break-word;
        }

        .topic-cell {
            text-align: left;
            font-weight: 500;
            width: 35%;
            /* Reduced from 40% to make room for extra column */
        }

        thead th:not(:first-child),
        tbody td:not(.topic-cell) {
            width: 8.13%;
            /* Adjusted to accommodate 8 columns instead of 7 */
        }

        .topic-title {
            font-size: 0.95rem;
            padding: 0.5rem;
        }

        thead th {
            background-color: var(--light-gray);
            color: var(--dark-gray);
            font-weight: 600;
        }

        /* Difficulty & Completion Styles */
        tr {
            color: var(--dark-gray);
        }

        tr.completed {
            background-color: var(--completed-bg-color) !important;
            color: var(--completed-text-color) !important;
        }

        tr.completed a {
            color: var(--completed-text-color) !important;
            font-weight: 500;
        }

        .difficulty-easy td:first-child {
            box-shadow: inset 5px 0 0 0 var(--success-color);
        }

        .difficulty-medium td:first-child {
            box-shadow: inset 5px 0 0 0 var(--warning-color);
        }

        .difficulty-hard td:first-child {
            box-shadow: inset 5px 0 0 0 var(--danger-color);
        }

        /* Link & SVG Styling */
        .link-cell {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .link-cell:hover {
            background-color: var(--light-gray);
        }

        .link-cell a {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -0.5rem -0.4rem;
            padding: 0.5rem 0.4rem;
            color: var(--link-color);
            text-decoration: none;
            height: 100%;
        }

        .link-cell svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .na-cell {
            color: #bdc3c7;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .status-cell {
            cursor: pointer;
        }

        .status-checkbox {
            -webkit-appearance: none;
            appearance: none;
            background-color: transparent;
            margin: auto;
            font: inherit;
            color: var(--dark-gray);
            width: 1.15em;
            height: 1.15em;
            border: 0.15em solid currentColor;
            border-radius: 0.15em;
            display: grid;
            place-content: center;
            pointer-events: none;
        }

        .status-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
            transform: scale(0);
            transform-origin: bottom left;
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--success-color);
        }

        .status-checkbox:checked {
            border-color: var(--success-color);
        }

        .status-checkbox:checked::before {
            transform: scale(1);
        }

        /* --- Star Column Styles --- */
        .star-cell {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s ease;
        }

        .star-cell:hover {
            background-color: var(--light-gray);
        }

        .star-icon {
            font-size: 1.35rem;
            line-height: 1;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.2s ease, filter 0.2s ease;
            display: inline-block;
            color: #555;
            filter: grayscale(1);
        }

        .star-icon.starred {
            color: #f5a623;
            filter: grayscale(0) drop-shadow(0 0 4px rgba(245, 166, 35, 0.45));
            transform: scale(1.2);
        }

        .star-icon:active {
            transform: scale(0.85);
        }

        /* --- Notes Column Styles --- */
        .notes-cell {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s ease;
        }

        .notes-cell:hover {
            background-color: var(--light-gray);
        }

        .notes-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .notes-icon svg {
            width: 20px;
            height: 20px;
            transition: fill 0.2s ease;
        }

        .notes-icon.empty svg {
            fill: #666;
        }

        .notes-icon.has-note svg {
            fill: #8ea1e9;
            filter: drop-shadow(0 0 3px rgba(142, 161, 233, 0.4));
        }

        .notes-icon:hover {
            transform: scale(1.15);
        }

        /* --- Notes Modal Styles --- */
        .notes-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .notes-modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .notes-modal {
            background: #2a2a2e;
            border: 1px solid #4a4a55;
            border-radius: 16px;
            padding: 1.75rem;
            width: min(480px, 90vw);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: translateY(20px) scale(0.97);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .notes-modal-overlay.visible .notes-modal {
            transform: translateY(0) scale(1);
        }

        .notes-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #4a4a55;
        }

        .notes-modal-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-color);
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 85%;
        }

        .notes-modal-close {
            background: none;
            border: none;
            color: #999;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.2rem;
            line-height: 1;
            border-radius: 6px;
            transition: color 0.2s ease, background-color 0.2s ease;
        }

        .notes-modal-close:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .notes-modal textarea {
            width: 100%;
            min-height: 150px;
            max-height: 50vh;
            resize: vertical;
            background: #1e1e22;
            border: 1px solid #4a4a55;
            border-radius: 10px;
            color: var(--dark-gray);
            padding: 0.85rem;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.6;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            box-sizing: border-box;
        }

        .notes-modal textarea:focus {
            border-color: #8ea1e9;
            box-shadow: 0 0 0 3px rgba(142, 161, 233, 0.15);
        }

        .notes-modal textarea::placeholder {
            color: #666;
        }

        .notes-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .notes-btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .notes-btn:active {
            transform: scale(0.97);
        }

        .notes-btn-save {
            background: #8ea1e9;
            color: #1a1a1e;
        }

        .notes-btn-save:hover {
            background: #a3b4f0;
        }

        .notes-btn-delete {
            background: rgba(229, 45, 39, 0.15);
            color: #e55;
        }

        .notes-btn-delete:hover {
            background: rgba(229, 45, 39, 0.25);
        }

        .notes-btn-cancel {
            background: #3a3a40;
            color: #ccc;
        }

        .notes-btn-cancel:hover {
            background: #45454d;
        }
    </style>
</head>

<body>
    <div id="roadmap-container" class="container">
        <h1>Loading Roadmap...</h1>
    </div>
    <!-- Notes Modal -->
    <div class="notes-modal-overlay" id="notes-modal-overlay">
        <div class="notes-modal">
            <div class="notes-modal-header">
                <h3 id="notes-modal-title">Notes</h3>
                <button type="button" class="notes-modal-close" id="notes-modal-close">&times;</button>
            </div>
            <textarea id="notes-modal-textarea" placeholder="Write your notes here..."></textarea>
            <div class="notes-modal-actions">
                <button type="button" class="notes-btn notes-btn-delete" id="notes-modal-delete">Delete</button>
                <button type="button" class="notes-btn notes-btn-cancel" id="notes-modal-cancel">Cancel</button>
                <button type="button" class="notes-btn notes-btn-save" id="notes-modal-save">Save</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'dsaRoadmapProgress';
        const NOTES_STORAGE_KEY = 'dsaRoadmapNotes';
        const STARS_STORAGE_KEY = 'dsaRoadmapStars';

        const platformLogos = {
            'BLOG': `<img src="./assets/logo/post.svg" alt="BLOG">`,
            'YT': `<img src="./assets/logo/yt.svg" alt="YT">`,
            'TUF': `<img src="./assets/logo/tuf.svg" alt="TUF">`,
            'GFG': `<img src="./assets/logo/gfg.svg" alt="GFG">`,
            'CN': `<img src="./assets/logo/cn.svg" alt="CN">`,
            'LC': `<img src="./assets/logo/lc.svg" alt="LC">`
        };

        document.addEventListener('DOMContentLoaded', () => {
            fetch('a2z.json').then(response => {
                if (!response.ok) throw new Error('Network response was not ok. Make sure a2z.json is in the same folder.');
                return response.json();
            }).then(roadmapData => {
                const progress = loadCompletionState();
                generateRoadmap(roadmapData, progress);
                addEventListeners();
            }).catch(handleError);
        });



        function generateRoadmap(data, progress) {
            const container = document.getElementById('roadmap-container');
            let htmlContent = `
                <div class="roadmap-header">
                    <h1>A2Z DSA Course Roadmap</h1>
                    <button type="button" id="toggle-all" class="toggle-all-btn">Expand all</button>
                </div>`;
            data.forEach(step => {
                let totalStepTopics = 0;
                let completedStepTopics = 0;
                let subStepsHtml = '';
                if (step.sub_steps) {
                    step.sub_steps.forEach(subStep => {
                        const totalSubStepTopics = subStep.topics.length;
                        const completedSubStepTopics = subStep.topics.filter(t => progress[t.id]).length;
                        const isSubStepComplete = totalSubStepTopics > 0 && completedSubStepTopics === totalSubStepTopics;
                        const subStepProgressClass = isSubStepComplete ? 'completed' : '';
                        const subStepPercentage = totalSubStepTopics > 0 ? (completedSubStepTopics / totalSubStepTopics) * 100 : 0;
                        totalStepTopics += totalSubStepTopics;
                        completedStepTopics += completedSubStepTopics;

                        subStepsHtml += `
                                <button type="button" class="sub-collapsible ${subStepProgressClass}" style="--progress-width: ${subStepPercentage}%" data-step="${step.step_no}" data-substep="${subStep.sub_step_no}">
                                    <span class="collapsible-title">${subStep.sub_step_no}. ${subStep.sub_step_title.replace(/\n/g, ' ')}</span>
                                    <span class="progress-counter">${completedSubStepTopics}/${totalSubStepTopics}</span>
                                </button>
                                <div class="sub-content">
                                    <div class="table-container">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>Topic</th>
                                                    <th title="Blog">BLOG</th>

                                                    <th title="YouTube">YT</th>
                                                    <th title="LeetCode">LC</th>
                                                    <th title="GeeksForGeeks">GFG</th>
                                                    <th title="CodingNinjas">CN</th>
                                                    <th title="TakeUForward+">TUF</th>
                                                    <th title="Star">⭐</th>
                                                    <th title="Notes">📝</th>
                                                    <th>Done</th>
                                                </tr>
                                            </thead>
                                            <tbody>`;
                        const notes = loadNotes();
                        const stars = loadStars();
                        subStep.topics.forEach(topic => {
                            const isCompleted = progress[topic.id] || false;
                            const difficultyClass = getDifficultyClass(topic.difficulty);
                            const completedClass = isCompleted ? 'completed' : '';
                            const checkedAttr = isCompleted ? 'checked' : '';
                            const isStarred = stars[topic.id] || false;
                            const hasNote = !!(notes[topic.id] && notes[topic.id].trim());

                            let tags = '';
                            if (topic.ques_topic) {
                                try {
                                    const parsedTags = JSON.parse(topic.ques_topic);
                                    tags = parsedTags.map(t => t.label).join(', ');
                                } catch (e) {
                                    console.error('Failed to parse ques_topic:', topic.ques_topic, e);
                                }
                            }

                            subStepsHtml += `
                                                <tr class="${difficultyClass} ${completedClass}" data-topic-id="${topic.id}">
                                                    <td class="topic-cell" title="${tags}">
                                                        <div class="topic-title">${topic.question_title}</div>
                                                    </td>
                                                    ${createLinkCell(topic.post_link, 'BLOG')}

                                                    ${createLinkCell(topic.yt_link, 'YT')}
                                                    ${createLinkCell(topic.lc_link, 'LC')}
                                                    ${createLinkCell(topic.gfg_link, 'GFG')}
                                                    ${createLinkCell(topic.cs_link, 'CN')}
                                                    ${createLinkCell(topic.plus_link, 'TUF')}
                                                    <td class="star-cell" data-star-id="${topic.id}">
                                                        <span class="star-icon ${isStarred ? 'starred' : ''}" data-star-id="${topic.id}">★</span>
                                                    </td>
                                                    <td class="notes-cell" data-notes-id="${topic.id}" data-topic-title="${topic.question_title}">
                                                        <span class="notes-icon ${hasNote ? 'has-note' : 'empty'}" data-notes-id="${topic.id}">
                                                            ${hasNote ? notesFilledSVG() : notesEmptySVG()}
                                                        </span>
                                                    </td>
                                                    <td class="status-cell">
                                                        <input type="checkbox" class="status-checkbox" data-id="${topic.id}" ${checkedAttr}>
                                                    </td>
                                                </tr>`;
                        });
                        subStepsHtml += `
                                            </tbody>
                                        </table>
                                    </div>
                                </div>`;
                    });
                }
                const isStepComplete = totalStepTopics > 0 && completedStepTopics === totalStepTopics;
                const stepProgressClass = isStepComplete ? 'completed' : '';
                const stepPercentage = totalStepTopics > 0 ? (completedStepTopics / totalStepTopics) * 100 : 0;
                htmlContent += `
                            <button type="button" class="collapsible ${stepProgressClass}" style="--progress-width: ${stepPercentage}%" data-step="${step.step_no}">
                                <span class="collapsible-title">Step ${step.step_no}: ${step.step_title}</span>
                                <span class="progress-counter">${completedStepTopics}/${totalStepTopics}</span>
                            </button>
                            <div class="content">${subStepsHtml}</div>`;
            });
            container.innerHTML = htmlContent;
        }

        function createLinkCell(url, label) {
            if (url) {
                const logo = platformLogos[label] || label;
                return `<td class="link-cell"><a href="${url}" target="_blank" rel="noopener noreferrer" title="${label}">${logo}</a></td>`;
            } else {
                return `<td class="na-cell">-</td>`;
            }
        }

        function getDifficultyClass(difficulty) {
            return ['difficulty-easy', 'difficulty-medium', 'difficulty-hard'][difficulty] || '';
        }

        // --- Notes SVG Icons ---
        function notesEmptySVG() {
            return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/><line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="12" y1="9.5" x2="12" y2="16.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`;
        }

        function notesFilledSVG() {
            return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/><line x1="8" y1="10" x2="16" y2="10" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="8" y1="13.5" x2="16" y2="13.5" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="8" y1="17" x2="13" y2="17" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`;
        }

        // --- Star State ---
        function loadStars() {
            try {
                const saved = localStorage.getItem(STARS_STORAGE_KEY);
                return saved ? JSON.parse(saved) : {};
            } catch (e) {
                console.error('Failed to load stars from localStorage', e);
                return {};
            }
        }

        function saveStars(stars) {
            try {
                localStorage.setItem(STARS_STORAGE_KEY, JSON.stringify(stars));
            } catch (e) {
                console.error('Failed to save stars to localStorage', e);
            }
        }

        // --- Notes State ---
        function loadNotes() {
            try {
                const saved = localStorage.getItem(NOTES_STORAGE_KEY);
                return saved ? JSON.parse(saved) : {};
            } catch (e) {
                console.error('Failed to load notes from localStorage', e);
                return {};
            }
        }

        function saveNotes(notes) {
            try {
                localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(notes));
            } catch (e) {
                console.error('Failed to save notes to localStorage', e);
            }
        }

        function loadCompletionState() {
            try {
                const savedProgress = localStorage.getItem(STORAGE_KEY);
                return savedProgress ? JSON.parse(savedProgress) : {};
            } catch (e) {
                console.error("Failed to load progress from localStorage", e);
                return {};
            }
        }

        function saveCompletionState(progress) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            } catch (e) {
                console.error("Failed to save progress to localStorage", e);
            }
        }

        function updateCounters(element) {
            const progress = loadCompletionState();
            const subStepContent = element.closest('.sub-content');
            if (subStepContent) {
                const subStepButton = subStepContent.previousElementSibling;
                const topicsInSubStep = Array.from(subStepContent.querySelectorAll('.status-checkbox'));
                const totalSubStep = topicsInSubStep.length;
                const completedSubStep = topicsInSubStep.filter(cb => progress[cb.dataset.id]).length;
                subStepButton.querySelector('.progress-counter').textContent = `${completedSubStep}/${totalSubStep}`;

                const subStepPercentage = totalSubStep > 0 ? (completedSubStep / totalSubStep) * 100 : 0;
                subStepButton.style.setProperty('--progress-width', `${subStepPercentage}%`);
                subStepButton.classList.toggle('completed', totalSubStep > 0 && completedSubStep === totalSubStep);
            }
            const mainContent = element.closest('.content');
            if (mainContent) {
                const mainStepButton = mainContent.previousElementSibling;
                const topicsInStep = Array.from(mainContent.querySelectorAll('.status-checkbox'));
                const totalStep = topicsInStep.length;
                const completedStep = topicsInStep.filter(cb => progress[cb.dataset.id]).length;
                mainStepButton.querySelector('.progress-counter').textContent = `${completedStep}/${totalStep}`;

                const stepPercentage = totalStep > 0 ? (completedStep / totalStep) * 100 : 0;
                mainStepButton.style.setProperty('--progress-width', `${stepPercentage}%`);
                mainStepButton.classList.toggle('completed', totalStep > 0 && completedStep === totalStep);
            }
        }

        function addEventListeners() {
            const container = document.getElementById('roadmap-container');
            const toggleAllBtn = document.getElementById('toggle-all');

            function updateToggleAllLabel() {
                if (!toggleAllBtn) return;
                const hasExpanded = container.querySelector('.collapsible.active, .sub-collapsible.active');
                toggleAllBtn.textContent = hasExpanded ? 'Collapse all' : 'Expand all';
            }

            // --- Notes Modal Logic ---
            const notesOverlay = document.getElementById('notes-modal-overlay');
            const notesTextarea = document.getElementById('notes-modal-textarea');
            const notesTitle = document.getElementById('notes-modal-title');
            const notesSaveBtn = document.getElementById('notes-modal-save');
            const notesCancelBtn = document.getElementById('notes-modal-cancel');
            const notesDeleteBtn = document.getElementById('notes-modal-delete');
            const notesCloseBtn = document.getElementById('notes-modal-close');
            let currentNotesTopicId = null;

            function openNotesModal(topicId, title) {
                currentNotesTopicId = topicId;
                const notes = loadNotes();
                notesTextarea.value = notes[topicId] || '';
                notesTitle.textContent = title || 'Notes';
                notesOverlay.classList.add('visible');
                setTimeout(() => notesTextarea.focus(), 150);
            }

            function closeNotesModal() {
                notesOverlay.classList.remove('visible');
                currentNotesTopicId = null;
            }

            function saveCurrentNote() {
                if (currentNotesTopicId === null) return;
                const notes = loadNotes();
                const text = notesTextarea.value.trim();
                if (text) {
                    notes[currentNotesTopicId] = text;
                } else {
                    delete notes[currentNotesTopicId];
                }
                saveNotes(notes);
                updateNoteIcon(currentNotesTopicId, !!text);
                closeNotesModal();
            }

            function deleteCurrentNote() {
                if (currentNotesTopicId === null) return;
                const notes = loadNotes();
                delete notes[currentNotesTopicId];
                saveNotes(notes);
                updateNoteIcon(currentNotesTopicId, false);
                closeNotesModal();
            }

            function updateNoteIcon(topicId, hasNote) {
                const icon = container.querySelector(`.notes-icon[data-notes-id="${topicId}"]`);
                if (icon) {
                    icon.classList.toggle('has-note', hasNote);
                    icon.classList.toggle('empty', !hasNote);
                    icon.innerHTML = hasNote ? notesFilledSVG() : notesEmptySVG();
                }
            }

            notesSaveBtn.addEventListener('click', saveCurrentNote);
            notesCancelBtn.addEventListener('click', closeNotesModal);
            notesCloseBtn.addEventListener('click', closeNotesModal);
            notesDeleteBtn.addEventListener('click', deleteCurrentNote);
            notesOverlay.addEventListener('click', (e) => {
                if (e.target === notesOverlay) closeNotesModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && notesOverlay.classList.contains('visible')) closeNotesModal();
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && notesOverlay.classList.contains('visible')) saveCurrentNote();
            });

            container.addEventListener('click', function (event) {
                const collapsible = event.target.closest('.collapsible, .sub-collapsible');
                const statusCell = event.target.closest('.status-cell');
                const starCell = event.target.closest('.star-cell');
                const notesCell = event.target.closest('.notes-cell');

                if (collapsible) {
                    collapsible.classList.toggle('active');
                    const content = collapsible.nextElementSibling;
                    if (content.style.maxHeight) {
                        content.style.maxHeight = null;
                    } else {
                        content.style.maxHeight = content.scrollHeight + "px";
                        const parentContent = content.closest('.content');
                        if (parentContent && parentContent.style.maxHeight) {
                            parentContent.style.maxHeight = (parentContent.scrollHeight + content.scrollHeight) + "px";
                        }
                    }
                    updateToggleAllLabel();
                }

                // --- Star Toggle ---
                if (starCell) {
                    const topicId = starCell.dataset.starId;
                    const icon = starCell.querySelector('.star-icon');
                    if (topicId && icon) {
                        const stars = loadStars();
                        const isNowStarred = !stars[topicId];
                        if (isNowStarred) {
                            stars[topicId] = true;
                        } else {
                            delete stars[topicId];
                        }
                        saveStars(stars);
                        icon.classList.toggle('starred', isNowStarred);
                    }
                }

                // --- Notes Open ---
                if (notesCell) {
                    const topicId = notesCell.dataset.notesId;
                    const topicTitle = notesCell.dataset.topicTitle || 'Notes';
                    if (topicId) {
                        openNotesModal(topicId, topicTitle);
                    }
                }

                if (statusCell) {
                    const checkbox = statusCell.querySelector('.status-checkbox');
                    if (checkbox) {
                        checkbox.checked = !checkbox.checked;
                        const topicId = checkbox.dataset.id;
                        const isChecked = checkbox.checked;
                        const progress = loadCompletionState();
                        progress[topicId] = isChecked;
                        saveCompletionState(progress);
                        checkbox.closest('tr').classList.toggle('completed', isChecked);
                        updateCounters(checkbox);
                    }
                }
            });

            if (toggleAllBtn) {
                toggleAllBtn.addEventListener('click', function () {
                    const allButtons = Array.from(container.querySelectorAll('.collapsible, .sub-collapsible'));
                    const hasExpanded = allButtons.some(b => b.classList.contains('active'));

                    if (!hasExpanded) {
                        // Expand nested sections first so parent scrollHeights are correct.
                        const subButtons = Array.from(container.querySelectorAll('.sub-collapsible'));
                        subButtons.forEach(btn => {
                            btn.classList.add('active');
                            const content = btn.nextElementSibling;
                            if (content) content.style.maxHeight = "none";
                        });

                        const mainButtons = Array.from(container.querySelectorAll('.collapsible'));
                        mainButtons.forEach(btn => {
                            btn.classList.add('active');
                            const content = btn.nextElementSibling;
                            if (content) content.style.maxHeight = "none";
                        });
                    } else {
                        const allContents = Array.from(container.querySelectorAll('.content, .sub-content'));
                        allButtons.forEach(btn => btn.classList.remove('active'));
                        allContents.forEach(c => c.style.maxHeight = null);
                    }

                    updateToggleAllLabel();
                });
            }

            updateToggleAllLabel();
        }

        function handleError(error) {
            console.error('Error:', error);
            const container = document.getElementById('roadmap-container');
            container.innerHTML = `
                <h1>Error</h1>
                <p>Could not load the roadmap. Please ensure 'a2z.json' is in the same directory and correctly formatted.</p>
                <p><em>${error.message}</em></p>`;
        }
    </script>
</body>

</html>
